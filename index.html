<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>to do list !</title>

<link href="https://fonts.googleapis.com/css2?family=Pangolin&display=swap" rel="stylesheet">

<style>
:root {
  --lavender:#c7b9ff;
  --deep:#6b5ca5;
  --soft:#ede9ff;
  --cream:#faf7ff;
}

* {
  box-sizing:border-box;
  font-family:'Pangolin', cursive;
}

body {
  margin:0;
  padding:20px;
  background:linear-gradient(180deg,#f4f0ff,#fff);
  overflow-x:hidden;
}

/* floating stars background */
.star {
  position:absolute;
  color:#d8d1ff;
  font-size:12px;
  opacity:0.4;
  animation: floatStar linear infinite;
  pointer-events:none;
}
@keyframes floatStar {
  from { transform:translateY(100vh); }
  to { transform:translateY(-10vh); }
}

.notebook {
  position:relative;
  max-width:420px;
  margin:auto;
  background:var(--cream);
  padding:20px;
  border-radius:20px;
  border:3px dashed var(--lavender);
  box-shadow:0 12px 30px rgba(0,0,0,.15);
  z-index:2;
}

h1 { text-align:center; color:var(--deep); margin:0; }

.date, .affirmation {
  text-align:center;
  color:#8d80c8;
  font-size:.95rem;
  margin:6px 0;
}

/* progress bar */
.progress-container {
  height:16px;
  background:#ddd6ff;
  border-radius:20px;
  overflow:hidden;
}
.progress-bar {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#b19cff,#d6c9ff);
  position:relative;
  transition:.4s;
}
.progress-bar::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.8) 50%,transparent 70%);
  animation:sparkle 2s infinite;
}
@keyframes sparkle {
  from{transform:translateX(-100%);}
  to{transform:translateX(100%);}
}

.progress-text {
  text-align:center;
  font-size:.8rem;
  margin:6px 0 12px;
  color:#7a6bb8;
}

/* input */
.add-task { display:flex; gap:6px; margin-bottom:10px; }
.add-task input, .add-task select {
  flex:1;
  padding:8px;
  border-radius:12px;
  border:2px solid var(--lavender);
}
.add-task button {
  background:var(--lavender);
  border:none;
  border-radius:12px;
  font-size:1.2rem;
  padding:0 12px;
}

/* tasks */
ul { list-style:none; padding:0; margin-top:10px; }
li {
  background:#fff;
  padding:10px;
  border-radius:14px;
  display:flex;
  gap:8px;
  align-items:center;
  margin-bottom:8px;
}

li input[type=checkbox] {
  appearance:none;
  width:22px; height:22px;
  border-radius:50%;
  border:2px solid #b7a9ff;
  cursor:pointer;
}
li input[type=checkbox]:checked {
  background:radial-gradient(circle,#fff 30%,#9f8cff 31%);
  transform:scale(1.15) rotate(-8deg);
}

.completed span.task-text {
  text-decoration:line-through;
  opacity:.6;
}

/* priority tags */
.tag {
  font-size:.7rem;
  padding:2px 6px;
  border-radius:8px;
  background:#eee;
}
.tag.high { background:#ffd6e9; }
.tag.low { background:#e6f2ff; }

/* celebration */
.celebration {
  display:none;
  text-align:center;
  margin-top:8px;
  animation:pop .5s;
}
@keyframes pop {
  from{transform:scale(.7);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.controls {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}
button.reset {
  background:none;
  border:none;
  color:#6b5ca5;
  cursor:pointer;
}

/* floating moon/star when checking */
.float-sticker {
  position:absolute;
  font-size:20px;
  animation:floatUp 1.5s ease-out forwards;
  pointer-events:none;
}
@keyframes floatUp {
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-80px);opacity:0;}
}
</style>
</head>

<body>

<script>
for(let i=0;i<25;i++){
  const s=document.createElement("div");
  s.className="star";
  s.textContent=Math.random()>0.5?"⭐":"✦";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=10+Math.random()*20+"s";
  document.body.appendChild(s);
}
</script>

<div class="notebook">
<h1>Today's Tasks 💜</h1>
<div class="date" id="date"></div>
<div class="affirmation" id="affirmation"></div>

<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>
<div class="progress-text" id="progressText">0 / 0 • 0%</div>

<div class="add-task">
  <input id="taskInput" placeholder="Write something magical . . ." />
  <select id="priority">
    <option value="normal">💜 normal</option>
    <option value="high">⭐ high</option>
    <option value="low">🌙 low</option>
  </select>
  <button onclick="addTask()">＋</button>
</div>

<ul id="taskList"></ul>

<div class="celebration" id="celebration">🎉 Done for today !</div>

<div class="controls">
  <button class="reset" onclick="resetDay()">🔄 New day ahead !</button>
</div>
</div>

<audio id="popSound">
  <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=">
</audio>

<script>
const affirmations=[
"You’re doing amazing 💜",
"Small steps still count 🪐",
"Be gentle with yourself 🌙",
"You showed up today ✨",
"Progress over perfection ⭐"
];

document.getElementById("affirmation").textContent =
 affirmations[new Date().getDate()%affirmations.length];

document.getElementById("date").textContent =
 new Date().toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});

const taskList=document.getElementById("taskList");
let tasks = JSON.parse(localStorage.getItem("scrapbookTasks")) || [];

function saveTasks(){
  localStorage.setItem("scrapbookTasks", JSON.stringify(tasks));
}

function render(){
  taskList.innerHTML="";
  tasks.forEach((task,index)=>{
    const li=document.createElement("li");
    if(task.completed) li.classList.add("completed");

    li.innerHTML=`
      <input type="checkbox" ${task.completed?"checked":""}
      onchange="toggleTask(${index}, event)">
      <span class="task-text">${task.text}</span>
      <span class="tag ${task.priority}">${task.priority}</span>
      <button onclick="deleteTask(${index})">🗑️</button>
    `;
    taskList.appendChild(li);
  });
  update();
}

function addTask(){
 const t=document.getElementById("taskInput");
 if(!t.value.trim())return;
 const p=document.getElementById("priority").value;
 tasks.push({text:t.value,priority:p,completed:false});
 t.value="";
 saveTasks();
 render();
}

function toggleTask(index,e){
 tasks[index].completed=!tasks[index].completed;
 document.getElementById("popSound").play();
 spawnSticker(e);
 saveTasks();
 render();
}

function deleteTask(index){
 tasks.splice(index,1);
 saveTasks();
 render();
}

function update(){
 const total=tasks.length;
 const done=tasks.filter(t=>t.completed).length;
 const pct=total?Math.round(done/total*100):0;

 document.getElementById("progressBar").style.width=pct+"%";
 document.getElementById("progressText").textContent=
 `${done} / ${total} • ${pct}%`;

 document.getElementById("celebration").style.display=
 total && done===total?"block":"none";
}

function resetDay(){
 if(confirm("Reset today’s list?")){
   tasks=[];
   saveTasks();
   render();
 }
}

function spawnSticker(e){
 const sticker=document.createElement("div");
 sticker.className="float-sticker";
 sticker.textContent=Math.random()>0.5?"🌙":"⭐";
 sticker.style.left=e.clientX+"px";
 sticker.style.top=e.clientY+"px";
 document.body.appendChild(sticker);
 setTimeout(()=>sticker.remove(),1500);
}

render();
</script>

</body>
</html>
